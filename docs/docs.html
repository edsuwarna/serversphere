<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ServerSphere — Documentation</title>
    <meta name="description" content="ServerSphere Documentation — Multi-Server Management Dashboard">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --bg: #0d1117; --bg2: #161b22; --bg3: #1c2128; --border: #30363d;
            --text: #e6edf3; --text2: #8b949e; --text3: #484f58;
            --accent: #58a6ff; --green: #3fb950; --orange: #d29922; --red: #f85149;
            --code-bg: #151b23; --inline-bg: #21262d;
            --toc-bg: #0d1117; --toc-border: #21262d;
            --card-hover: #1f6feb11;
        }
        [data-theme="light"] {
            --bg: #ffffff; --bg2: #f6f8fa; --bg3: #eef1f5; --border: #d0d7de;
            --text: #1f2328; --text2: #656d76; --text3: #afb8c1;
            --accent: #0969da; --green: #1a7f37; --orange: #9a6700; --red: #cf222e;
            --code-bg: #f6f8fa; --inline-bg: #eef1f5;
            --toc-bg: #ffffff; --toc-border: #d0d7de;
            --card-hover: #ddf4ff11;
        }
        html { scroll-behavior: smooth; }
        body { font-family: 'Inter', -apple-system, sans-serif; background: var(--bg); color: var(--text); line-height: 1.7; font-size: 15px; transition: background 0.2s, color 0.2s; }
        .layout { display: flex; min-height: 100vh; }
        .sidebar { width: 260px; background: var(--bg2); border-right: 1px solid var(--border); position: fixed; top: 0; left: 0; height: 100vh; overflow-y: auto; z-index: 100; transition: background 0.2s; }
        .sidebar-header { padding: 16px 20px; border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 10px; }
        .sidebar-header .logo { font-size: 24px; line-height: 1; }
        .sidebar-header h2 { font-size: 15px; font-weight: 700; background: linear-gradient(135deg,var(--accent),var(--green)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
        .sidebar-header small { display: block; font-size: 11px; color: var(--text2); font-weight: 400; -webkit-text-fill-color: var(--text2); }
        .sidebar-back { display: flex; align-items: center; gap: 6px; padding: 10px 20px; color: var(--accent); text-decoration: none; font-size: 13px; font-weight: 500; border-bottom: 1px solid var(--border); transition: background 0.2s; }
        .sidebar-back:hover { background: var(--bg3); }
        .sidebar-nav { padding: 8px 0; }
        .sidebar-label { padding: 6px 20px 4px; font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.05em; color: var(--text2); }
        .sidebar-nav a { display: block; padding: 5px 20px; color: var(--text2); text-decoration: none; font-size: 13px; border-left: 2px solid transparent; transition: all 0.15s; }
        .sidebar-nav a:hover { color: var(--text); background: var(--bg3); }
        .sidebar-nav a.active { color: var(--accent); border-left-color: var(--accent); background: var(--card-hover); }
        .sidebar::-webkit-scrollbar { width: 6px; }
        .sidebar::-webkit-scrollbar-track { background: transparent; }
        .sidebar::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
        .sidebar-toggle { display: none; position: fixed; top: 12px; left: 12px; z-index: 200; background: var(--bg2); border: 1px solid var(--border); border-radius: 8px; padding: 8px 12px; cursor: pointer; font-size: 20px; color: var(--text); }
        .sidebar-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 99; }
        .content { flex: 1; margin-left: 260px; padding: 40px 48px; max-width: 860px; }
        .right-toc { position: fixed; top: 0; right: 0; width: 220px; height: 100vh; overflow-y: auto; padding: 24px 16px 24px 12px; border-left: 1px solid var(--toc-border); background: var(--toc-bg); transition: background 0.2s; display: none; }
        .right-toc-label { font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.05em; color: var(--text2); margin-bottom: 12px; }
        .right-toc a { display: block; padding: 3px 8px; font-size: 12.5px; color: var(--text2); text-decoration: none; border-left: 2px solid transparent; transition: all 0.15s; line-height: 1.6; }
        .right-toc a:hover { color: var(--text); }
        .right-toc a.active { color: var(--accent); border-left-color: var(--accent); }
        .right-toc a.lvl-h2 { padding-left: 8px; }
        .right-toc a.lvl-h3 { padding-left: 22px; font-size: 12px; }
        .right-toc a.lvl-h4 { padding-left: 36px; font-size: 11.5px; }
        .right-toc::-webkit-scrollbar { width: 4px; }
        .right-toc::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
        @media (min-width: 1400px) { .right-toc { display: block; } .content { max-width: 760px; padding: 40px 64px 40px 48px; } }
        @media (min-width: 1600px) { .right-toc { width: 250px; } }
        @media (max-width: 900px) { .sidebar { transform: translateX(-100%); } .sidebar.open { transform: translateX(0); } .sidebar-overlay.open { display: block; } .sidebar-toggle { display: block; } .content { margin-left: 0; padding: 24px 20px; max-width: 100%; } }
        .theme-toggle { position: fixed; top: 12px; right: 12px; z-index: 300; background: var(--bg2); border: 1px solid var(--border); border-radius: 8px; width: 36px; height: 36px; display: flex; align-items: center; justify-content: center; cursor: pointer; font-size: 16px; transition: all 0.2s; box-shadow: 0 2px 8px rgba(0,0,0,0.2); }
        .theme-toggle:hover { background: var(--bg3); }
        @media (min-width: 1400px) { .theme-toggle { right: 240px; } }
        .markdown-body h1 { font-size: 36px; font-weight: 800; margin: 0 0 8px; background: linear-gradient(135deg,var(--accent),var(--green)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
        .markdown-body h1 .anchor, .markdown-body h1 a { display: none; }
        .markdown-body h2 { font-size: 24px; font-weight: 700; margin: 40px 0 12px; padding-bottom: 8px; border-bottom: 1px solid var(--border); }
        .markdown-body h3 { font-size: 18px; font-weight: 600; margin: 28px 0 8px; }
        .markdown-body h4 { font-size: 15px; font-weight: 600; margin: 20px 0 6px; }
        .markdown-body p { margin: 0 0 12px; }
        .markdown-body a { color: var(--accent); text-decoration: none; }
        .markdown-body a:hover { text-decoration: underline; }
        .markdown-body ul, .markdown-body ol { margin: 8px 0 16px; padding-left: 24px; }
        .markdown-body li { margin-bottom: 4px; }
        .markdown-body table { width: 100%; border-collapse: collapse; margin: 16px 0 20px; font-size: 14px; }
        .markdown-body th { background: var(--bg3); padding: 10px 12px; text-align: left; font-weight: 600; border: 1px solid var(--border); }
        .markdown-body td { padding: 8px 12px; border: 1px solid var(--border); }
        .markdown-body tr:nth-child(even) td { background: var(--bg2); }
        .markdown-body code { background: var(--inline-bg); border: 1px solid var(--border); padding: 2px 6px; border-radius: 4px; font-family: 'SF Mono','Fira Code',monospace; font-size: 13px; }
        .markdown-body pre { background: var(--code-bg); border: 1px solid var(--border); border-radius: 8px; padding: 18px 20px; margin: 12px 0 20px; overflow-x: auto; line-height: 1.5; }
        .markdown-body pre code { background: none; border: none; padding: 0; font-size: 13px; }
        .code-block-wrap { position: relative; }
        .code-block-wrap pre { padding-top: 24px; }
        .copy-btn { position: absolute; top: 6px; right: 6px; background: var(--bg3); border: 1px solid var(--border); border-radius: 5px; padding: 3px 9px; font-size: 11px; font-family: 'Inter', -apple-system, sans-serif; color: var(--text2); cursor: pointer; opacity: 0; transition: opacity 0.2s, background 0.15s, color 0.15s; z-index: 10; line-height: 1.5; }
        .code-block-wrap:hover .copy-btn { opacity: 1; }
        .copy-btn:hover { background: var(--bg2); color: var(--text); }
        .copy-btn.copied { color: var(--green); border-color: var(--green); }
        .markdown-body blockquote { border-left: 3px solid var(--accent); padding: 12px 16px; margin: 12px 0 20px; background: color-mix(in srgb, var(--accent) 6%, transparent); border-radius: 0 8px 8px 0; }
        .markdown-body blockquote p { margin: 0; color: var(--text2); }
        .markdown-body hr { border: none; border-top: 1px solid var(--border); margin: 36px 0; }
        .markdown-body img { max-width: 100%; border-radius: 8px; }
        .loading-state { text-align: center; padding: 80px 20px; }
        .loading-state .spinner { width: 40px; height: 40px; border: 3px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.8s linear infinite; margin: 0 auto 16px; }
        @keyframes spin { to { transform: rotate(360deg); } }
        .loading-state p { color: var(--text2); font-size: 14px; }
        .error-state { text-align: center; padding: 80px 20px; }
        .error-state .err-icon { font-size: 48px; margin-bottom: 12px; }
        .error-state h2 { color: var(--red); }
        .error-state p { color: var(--text2); margin-top: 8px; }
        .doc-footer { margin-top: 48px; padding-top: 24px; border-top: 1px solid var(--border); text-align: center; color: var(--text2); font-size: 13px; }
        .doc-footer a { color: var(--accent); text-decoration: none; }
    </style>
</head>
<body>
    <button class="sidebar-toggle" id="sidebarToggle">☰</button>
    <div class="sidebar-overlay" id="sidebarOverlay"></div>
    <button class="theme-toggle" id="themeToggle" title="Toggle theme">🌙</button>

    <div class="layout">
        <nav class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <div class="logo">🌐</div>
                <div><h2>ServerSphere</h2><small>Multi-Server Dashboard</small></div>
            </div>
            <a href="index.html" class="sidebar-back">← Back to Home</a>
            <div class="sidebar-nav" id="navLinks">
                <div class="sidebar-label" id="navLabel">Documentation</div>
            </div>
        </nav>

        <main class="content">
            <div id="docsContent">
                <div class="loading-state"><div class="spinner"></div><p>Loading documentation...</p></div>
            </div>
            <div class="doc-footer">
                Built with ❤️ by <a href="https://github.com/edsuwarna">Endang Suwarna</a> ·
                <a href="https://github.com/edsuwarna/serversphere">GitHub</a> ·
                <a id="editOnGitHub" href="#">Edit on GitHub</a>
            </div>
        </main>

        <aside class="right-toc" id="rightToc">
            <div class="right-toc-label">📑 On this page</div>
            <div id="rightTocLinks"></div>
        </aside>
    </div>

    <script>
        const PAGES = [
            { id: "overview", label: "📖 Overview" },
            { id: "quickstart", label: "⚡ Quick Start" },
            { id: "architecture", label: "🏗 Architecture" },
            { id: "installation", label: "📦 Installation" },
            { id: "configuration", label: "⚙️ Configuration" },
            { id: "usage-guide", label: "🚀 Usage Guide" },
            { id: "features", label: "✨ Features" },
            { id: "oidc", label: "🔑 OIDC / SSO" },
            { id: "api", label: "🔌 API Reference" },
            { id: "database", label: "🗄 Database Schema" },
            { id: "development", label: "🛠️ Development" },
            { id: "security", label: "🔒 Security" },
            { id: "troubleshooting", label: "🔍 Troubleshooting" },
        ];

        let currentPage = "overview";
        let tocObserver = null;

        function getTheme() { return document.documentElement.getAttribute('data-theme'); }
        function setTheme(theme) {
            document.documentElement.setAttribute('data-theme', theme);
            localStorage.setItem('ss-docs-theme', theme);
            document.getElementById('themeToggle').textContent = theme === 'dark' ? '🌙' : '☀️';
        }
        function toggleTheme() { setTheme(getTheme() === 'dark' ? 'light' : 'dark'); }
        document.getElementById('themeToggle').addEventListener('click', toggleTheme);
        const saved = localStorage.getItem('ss-docs-theme');
        if (saved) setTheme(saved);

        function rebuildNav() {
            const container = document.getElementById("navLinks");
            const label = container.querySelector(".sidebar-label");
            container.innerHTML = '';
            container.appendChild(label);
            PAGES.forEach(p => {
                const a = document.createElement("a");
                a.href = `?page=${p.id}`;
                a.textContent = p.label;
                a.dataset.page = p.id;
                if (p.id === currentPage) a.classList.add("active");
                a.addEventListener("click", e => {
                    e.preventDefault();
                    loadPage(p.id);
                    if (window.innerWidth <= 900) toggleSidebar();
                });
                container.appendChild(a);
            });
        }

        function toggleSidebar() {
            document.getElementById("sidebar").classList.toggle("open");
            document.getElementById("sidebarOverlay").classList.toggle("open");
        }
        document.getElementById("sidebarToggle").onclick = toggleSidebar;
        document.getElementById("sidebarOverlay").onclick = toggleSidebar;

        function renderMarkdown(md) {
            md = md.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
            const codeBlocks = [];
            md = md.replace(/```(\w*)\n([\s\S]*?)```/g, (_, lang, code) => {
                const id = codeBlocks.length;
                codeBlocks.push({ lang, code: code.replace(/&lt;/g,'<').replace(/&gt;/g,'>').replace(/&amp;/g,'&') });
                return `%%CB_${id}%%`;
            });
            const inlineCodes = [];
            md = md.replace(/`([^`]+)`/g, (_, c) => {
                const id = inlineCodes.length;
                inlineCodes.push(c);
                return `%%IC_${id}%%`;
            });
            let hidCount = {};
            function makeId(text) {
                const id = text.toLowerCase().replace(/[^a-z0-9]+/g, '-').replace(/^-|-$/g, '') || 'section';
                hidCount[id] = (hidCount[id] || 0) + 1;
                return hidCount[id] > 1 ? id + '-' + hidCount[id] : id;
            }
            md = md.replace(/^#### (.+)$/gm, (_, t) => `<h4 id="${makeId(t)}">${t}</h4>`);
            md = md.replace(/^### (.+)$/gm, (_, t) => `<h3 id="${makeId(t)}">${t}</h3>`);
            md = md.replace(/^## (.+)$/gm, (_, t) => `<h2 id="${makeId(t)}">${t}</h2>`);
            md = md.replace(/^# (.+)$/gm, (_, t) => `<h1 id="${makeId(t)}">${t}</h1>`);
            md = md.replace(/^---+$/gm, '<hr>');
            md = md.replace(/\*\*\*(.+?)\*\*\*/g, '<strong><em>$1</em></strong>');
            md = md.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
            md = md.replace(/\*(.+?)\*/g, '<em>$1</em>');
            md = md.replace(/~~(.+?)~~/g, '<del>$1</del>');
            md = md.replace(/!\[([^\]]*)\]\(([^)]+)\)/g, '<img src="$2" alt="$1" loading="lazy">');
            md = md.replace(/\[([^\]]+)\]\(([^)]+)\)/g, (_, t, u) => `<a href="${u}"${u.startsWith('http')?' target="_blank" rel="noopener"':''}>${t}</a>`);
            md = md.replace(/- \[x\] /gi, '- ✅ ').replace(/- \[ \] /gi, '- ☐ ');
            md = md.replace(/^(\s*)[-*] (.+)$/gm, '$1• $2');
            md = md.replace(/^(\s*)(\d+)\. (.+)$/gm, '$1$2. $3');
            md = md.replace(/^(&gt;|>) (.+)$/gm, '<blockquote><p>$2</p></blockquote>');
            md = md.replace(/%%IC_(\d+)%%/g, (_, id) => `<code>${inlineCodes[parseInt(id)]}</code>`);
            md = md.replace(/^(\|.+\|)\n\|[-| :]+\|\n((?:\|.+\|\n?)*)/gm, (_, h, b) => {
                const headers = h.split('|').filter(c=>c.trim()).map(c=>c.trim());
                const rows = b.trim().split('\n').map(r => r.split('|').filter(c=>c.trim()).map(c=>c.trim()));
                let tbl = '<table><thead><tr>';
                headers.forEach(h => tbl += `<th>${h}</th>`);
                tbl += '</tr></thead><tbody>';
                rows.forEach(r => { tbl += '<tr>'; r.forEach(c => tbl += `<td>${c}</td>`); tbl += '</tr>'; });
                tbl += '</tbody></table>';
                return tbl;
            });
            const lines = md.split('\n');
            let html = '', inPara = false;
            for (let i = 0; i < lines.length; i++) {
                const l = lines[i].trim();
                if (!l) { if (inPara) { html += '</p>'; inPara = false; } continue; }
                if (l.startsWith('<h') || l.startsWith('<pre') || l.startsWith('<table') || l.startsWith('<hr') || l.startsWith('<blockquote') || l.startsWith('</') || l.startsWith('%%CB_')) {
                    if (inPara) { html += '</p>'; inPara = false; } html += l + '\n'; continue;
                }
                if (l.startsWith('•') || l.match(/^\d+\./)) { if (inPara) { html += '</p>'; inPara = false; } html += l + '\n'; continue; }
                if (!inPara) { html += '<p>'; inPara = true; } else html += ' ';
                html += l;
            }
            if (inPara) html += '</p>';
            html = html.replace(/%%CB_(\d+)%%/g, (_, id) => {
                const b = codeBlocks[parseInt(id)];
                const lang = b.lang ? `<div style="font-size:11px;color:var(--text2);margin-bottom:-2px;font-family:monospace;">${b.lang}</div>` : '';
                const encoded = encodeURIComponent(b.code);
                return `<div class="code-block-wrap"><button class="copy-btn" data-encoded="${encoded}">📋 Copy</button><pre>${lang}<code>${escapeHtml(b.code)}</code></pre></div>`;
            });
            return html;
        }

        function escapeHtml(s) { return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

        function setupCopyButtons() {
            document.querySelectorAll('.copy-btn').forEach(btn => {
                btn.addEventListener('click', function() {
                    const code = decodeURIComponent(this.dataset.encoded);
                    const self = this;
                    if (navigator.clipboard && navigator.clipboard.writeText) {
                        navigator.clipboard.writeText(code).then(() => {
                            self.textContent = '✅ Copied!'; self.classList.add('copied');
                            setTimeout(() => { self.textContent = '📋 Copy'; self.classList.remove('copied'); }, 2000);
                        }).catch(() => fallbackCopy(code, self));
                    } else { fallbackCopy(code, self); }
                });
            });
            function fallbackCopy(text, btn) {
                const ta = document.createElement('textarea'); ta.value = text;
                ta.style.position = 'fixed'; ta.style.opacity = '0';
                document.body.appendChild(ta); ta.select();
                document.execCommand('copy'); document.body.removeChild(ta);
                btn.textContent = '✅ Copied!'; btn.classList.add('copied');
                setTimeout(() => { btn.textContent = '📋 Copy'; btn.classList.remove('copied'); }, 2000);
            }
        }

        function buildRightTOC(html) {
            const container = document.getElementById('rightTocLinks');
            container.innerHTML = '';
            const headings = html.match(/<h([234]) id="([^"]+)"[^>]*>([^<]+)<\/h[234]>/g);
            if (!headings || headings.length < 2) { container.innerHTML = '<div style="color:var(--text3);font-size:12px;">No sections</div>'; return []; }
            const items = [];
            headings.forEach(h => {
                const lvl = parseInt(h.match(/<h([234])/)[1]);
                const id = h.match(/id="([^"]+)"/)[1];
                const txt = h.match(/<h[234][^>]*>([^<]+)<\/h[234]>/)[1];
                if (lvl === 1) return;
                const a = document.createElement('a');
                a.href = `#${id}`; a.textContent = txt; a.className = `lvl-h${lvl}`;
                a.addEventListener('click', e => { e.preventDefault(); document.getElementById(id)?.scrollIntoView({ behavior: 'smooth' }); window.history.replaceState(null, '', `#${id}`); });
                container.appendChild(a);
                items.push({ el: a, id });
            });
            return items;
        }

        function setupRightTOCScroll(tocItems) {
            if (tocObserver) tocObserver.disconnect();
            if (!tocItems || tocItems.length === 0) return;
            tocObserver = new IntersectionObserver((entries) => {
                let visible = null;
                entries.forEach(e => { if (e.isIntersecting) visible = e.target.id; });
                if (!visible) {
                    let best = null, bestDist = Infinity;
                    tocItems.forEach(item => {
                        const el = document.getElementById(item.id);
                        if (!el) return;
                        const dist = Math.abs(el.getBoundingClientRect().top);
                        if (dist < bestDist) { bestDist = dist; best = item; }
                    });
                    if (best) visible = best.id;
                }
                if (visible) tocItems.forEach(i => i.el.classList.toggle('active', i.id === visible));
            }, { rootMargin: '-80px 0px -60% 0px' });
            tocItems.forEach(item => { const el = document.getElementById(item.id); if (el) tocObserver.observe(el); });
        }

        async function loadPage(pageId) {
            currentPage = pageId;
            document.querySelectorAll('.sidebar-nav a').forEach(a => a.classList.toggle('active', a.dataset.page === pageId));
            const url = new URL(window.location);
            url.search = `?page=${pageId}`;
            url.hash = '';
            window.history.replaceState({page: pageId}, '', url);
            const fileName = pageId === 'overview' ? 'README' : pageId;
            document.getElementById('editOnGitHub').href = `https://github.com/edsuwarna/serversphere/blob/main/docs/${fileName}.md`;
            const page = PAGES.find(p => p.id === pageId);
            if (page) document.title = `${page.label.replace(/^[^\s]+\s/, '')} — ServerSphere`;
            const container = document.getElementById('docsContent');
            container.innerHTML = '<div class="loading-state"><div class="spinner"></div><p>Loading documentation...</p></div>';
            try {
                const resp = await fetch(`${fileName}.md`);
                if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
                const md = await resp.text();
                const html = renderMarkdown(md);
                container.innerHTML = `<div class="markdown-body">${html}</div>`;
                setupCopyButtons();
                const tocItems = buildRightTOC(html);
                setupRightTOCScroll(tocItems);
                if (window.location.hash) setTimeout(() => document.getElementById(window.location.hash.slice(1))?.scrollIntoView({ behavior: 'smooth' }), 150);
            } catch (err) {
                container.innerHTML = `<div class="error-state"><div class="err-icon">⚠️</div><h2>Page not available</h2><p>This page is being written. Check back soon!</p><p style="margin-top:16px;color:var(--text2);font-size:13px;">${err.message}</p></div>`;
            }
        }

        // Backward compat: old ?lang=id... → redirect to English
        const params = new URLSearchParams(window.location.search);
        if (params.get('lang') === 'id') {
            const page = params.get('page') || 'overview';
            window.history.replaceState(null, '', `?page=${page}`);
        }
        rebuildNav();
        const initialPage = params.get('page') || 'overview';
        loadPage(initialPage);
        window.addEventListener('hashchange', () => { if (window.location.hash) setTimeout(() => document.getElementById(window.location.hash.slice(1))?.scrollIntoView({ behavior: 'smooth' }), 150); });
    </script>
</body>
</html>
